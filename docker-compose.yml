services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       supplychain
      POSTGRES_USER:     supplychain
      POSTGRES_PASSWORD: supplychain
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplychain"]
      interval: 5s
      timeout: 5s
      retries: 10

  sbom-ingester:
    build:
      context: services/sbom-ingester
    environment:
      DATABASE_URL: postgres://supplychain:supplychain@postgres:5432/supplychain
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - grype-db:/grype-db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  grype-db:
